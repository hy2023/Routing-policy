# ===============================
# Mihome-fallback-all方案 - 最终版
# 代理提供商填入订阅信息,DNS按需修改便可直接使用
# ===============================

# ========================
# 代理提供商的公共设置锚点
# ========================
BaseProvider: &BP {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 300}, filter: '^(?!.*(到期|过期|剩余|网址|官网|邮箱|订阅|套餐|流量|说明|重置)).*$'}
# =======================================================
# 代理提供商 (Proxy Providers) - 定义从外部订阅获取代理节点
# 修改"实例名称,订阅链接"为代理提供商信息,"前缀"为自定义节点前缀名称
# =======================================================
proxy-providers:

#  示例名称1: {<<: *BP, url: '订阅链接1', override: {additional-prefix: '[前缀1] '}}
  示例名称2: {<<: *BP, url: '订阅链接2', override: {additional-prefix: '[前缀2] '}}

# =====================================================

# ========================
# 代理节点定义 (Proxies) - 定义内置或静态代理节点
# ========================
proxies:
  - {name: 🎯直连, type: direct}
  - {name: 🚫拒绝, type: reject}

# ========================
# 通用设置及主要端口 - Clash核心运行参数
# ========================
log-level: warning
mode: rule
find-process-mode: off
ipv6: true # 全局启用IPv6支持（可选值: true,false），建议在网络环境支持时将其设置为 true，否则可能引发未知问题。
unified-delay: true
tcp-concurrent: true
disable-keep-alive: false
keep-alive-idle: 600
keep-alive-interval: 15

allow-lan: true
port: 7890
socks-port: 7891
mixed-port: 7893
redir-port: 7892
tproxy-port: 7895

# ========================
# TUN 模块配置 - 透明代理功能
# ========================
tun:
  enable: true
  device: utun
  stack: mixed
  strict-route: false
  endpoint-independent-nat: true
  dns-hijack: [any:53, tcp://any:53] 
# ———  以下三项在插件默认控制模式设为 false，如在仅核心模式必需设为 true  ———
  auto-route: false             # 路由接管：自动修改系统路由表引流。
  auto-redirect: false          # 流量劫持：拦截并重定向网络数据包。
  auto-detect-interface: false  # 出口识别：自动绑定上网网卡，防环路。

# ========================================================
# 实验性功能：使用 Hy2/TUIC 节点出现断流、测速波动大，可开启此项
# ========================================================
#quic-go-disable-gso: true

# ========================
# DNS 配置 - 域名解析设置
# 建议优先使用运营商下放DNS替换下方nameserver加密DNS,并删除default-nameserver部分
# ========================
dns:
  enable: true
  cache-algorithm: arc
  listen: '[::]:1053'
  ipv6: true # 启用 IPv6 DNS 解析支持
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64
  fake-ip-filter: # Fake IP黑名单，这些域名不使用Fake IP
    - +.lan
    - +.local
    - geosite:cn
    - geosite:private
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - localhost.ptlogin2.qq.com

  fake-ip-filter-mode: blacklist
  use-system-hosts: true
  use-hosts: true
  default-nameserver: # 如nameserver部分填的运营商DNS需删除default-nameserver部分
    - 119.29.29.29
    - 223.5.5.5
  nameserver: # 建议优先使用运营商DNS替换下方加密DNS
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

# ========================
# 外部控制及UI设置
# ========================
external-controller: 0.0.0.0:9090
external-ui: ui
external-ui-name: zashboard
external-ui-url: https://fastly.jsdelivr.net/gh/Zephyruso/zashboard@gh-pages/archive.zip
secret: "654321"
profile: { store-selected: true, store-fake-ip: true }

# ========================
# Geo 数据管理 - 地理数据文件（GeoIP/GeoSite）的设置
# 源地址 https://github.com/MetaCubeX/meta-rules-dat
# ========================
geodata-mode: true # Geo数据文件模式：false 为 GeoIP (mmdb格式)，true 为 GeoSite (dat格式)。
geodata-loader: standard # GEO数据加载方式：standard (标准模式，速度快) 或 memconservative (内存节省模式)。

geox-url: #  GEO 数据下载地址
  geoip: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

geo-auto-update: true
geo-update-interval: 24 # GEO 数据更新间隔，单位为小时

# ========================
# 策略组定义 (Proxy Groups) - 组织代理节点和路由逻辑
# 图标库:https://www.clashverge.dev/guide/group_icon/icon_sets/Qure.html
# ========================

# 定义策略组代理列表锚点
default-proxies: &dp {type: select, proxies: [🎯直连, 所有-手动, 所有-自动, 香港-故转, 台湾-故转, 狮城-故转, 美国-故转, 日本-故转, 其他-故转, 🚫拒绝]}
# 定义区域组通用参数锚点
select-defaults: &sd {type: select, include-all: true}
fallback-defaults: &fbd {type: fallback, url: 'https://www.gstatic.com/generate_204', interval: 300, lazy: false, timeout: 2000, max-failed-times: 3, hidden: true}
url-test-defaults: &utd {type: url-test, url: 'https://www.gstatic.com/generate_204', interval: 300, lazy: false, tolerance: 50, timeout: 2000, max-failed-times: 3, hidden: true, include-all: true}

proxy-groups:
  # 业务分流策略组 - 根据不同应用或服务类型进行分流
  - {name: Proxy,     <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Rocket.png"} # 默认代理组，未匹配规则的流量或通用代理
  - {name: AI,        <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AI.png"} # AI服务专用组 (如ChatGPT, Gemini 等)
  - {name: Google,    <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png"} # Google服务专用组
  - {name: YouTube,   <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png"} # YouTube专用组
  - {name: Streaming, <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Streaming!CN.png"} # 流媒体服务专用组(如Netflix, Disney+, TikTok 等)
  - {name: Chat,      <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png"} # 即时通讯 (如 Telegram, WhatsApp, Line 等)
  - {name: Social,    <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Instagram.png"} # 社交媒体 (如 X, Instagram, Facebook 等)
  - {name: Test,      <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Speedtest.png"} # 用于测速工具等
  - {name: Emby,      <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Emby.png"} # Emby服务直连专用组
  - {name: Game,      <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Game.png"} # 游戏服务专用组
  - {name: Corp,      <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple.png"} # 针对企业服务专用组 (如Apple, Microsoft, Nvidia 等)
  - {name: CN,        <<: *dp, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Domestic.png"} # 国内流量专用组 (最终直连的流量)

# 所有节点选择组
  - {name: 所有-手动,  <<: *sd, filter: '^((?!(直连|拒绝)).)*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Static.png"}
  - {name: 所有-自动,  <<: *utd, filter: '^(?i)(?!.*\[69\])((?!(直连|拒绝)).)*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"}

  # 香港区域组
  - {name: 香港-故转,  <<: *fbd, proxies: [香港-手动, 香港-自动], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png"}
  - {name: 香港-手动,  <<: *sd, filter: '^(?i)(?=.*(广港|香港|🇭🇰|\bHK\b|Hong(?:\s?Kong)?|HKG)).*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png"}
  - {name: 香港-自动,  <<: *utd, filter: '^(?i)(?=.*(广港|香港|🇭🇰|\bHK\b|Hong(?:\s?Kong)?|HKG)).*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png"}

  # 台湾区域组
  - {name: 台湾-故转,  <<: *fbd, proxies: [台湾-手动, 台湾-自动], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png"}
  - {name: 台湾-手动,  <<: *sd, filter: '^(?i)(?=.*(广台|台湾|台灣|🇹🇼|🇨🇳|\bTW\b|Tai(?:\s?Wan)?)).*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png"}
  - {name: 台湾-自动,  <<: *utd, filter: '^(?i)(?!.*\[69\])(?=.*(广台|台湾|台灣|🇹🇼|🇨🇳|\bTW\b|Tai(?:\s?Wan)?)).*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png"}

  # 狮城区域组
  - {name: 狮城-故转,  <<: *fbd, proxies: [狮城-手动, 狮城-自动], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png"}
  - {name: 狮城-手动,  <<: *sd, filter: '^(?i)(?=.*(广新|新加坡|坡|狮城|🇸🇬|\bSG\b|Singa(?:\s?pore)?|SGP)).*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png"}
  - {name: 狮城-自动,  <<: *utd, filter: '^(?i)(?!.*\[69\])(?=.*(广新|新加坡|坡|狮城|🇸🇬|\bSG\b|Singa(?:\s?pore)?|SGP)).*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png"}

  # 北美区域组 (包含美国、加拿大、墨西哥等区域)
  - {name: 美国-故转,  <<: *fbd, proxies: [美国-手动, 美国-自动], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png"}
  - {name: 美国-手动,  <<: *sd, filter: '^(?i)(?=.*(广美|美|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United(?:\s?States)?|\bUS\b|加拿大|🇨🇦|\bCA\b|Canada|墨西哥|🇲🇽|\bMX\b|Mexico)).*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png"}
  - {name: 美国-自动,  <<: *utd, filter: '^(?i)(?!.*\[69\])(?=.*(广美|美|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United(?:\s?States)?|\bUS\b|加拿大|🇨🇦|\bCA\b|Canada|墨西哥|🇲🇽|\bMX\b|Mexico)).*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png"}

  # 日本区域组
  - {name: 日本-故转,  <<: *fbd, proxies: [日本-手动, 日本-自动], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png"}
  - {name: 日本-手动,  <<: *sd, filter: '^(?i)(?=.*(广日|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|\bJP\b|Japan|NRT|HND)).*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png"}
  - {name: 日本-自动,  <<: *utd, filter: '^(?i)(?!.*\[69\])(?=.*(广日|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|\bJP\b|Japan|NRT|HND)).*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png"}

  # 其他区域组 (除上述区域外的所有节点)
  - {name: 其他-故转,  <<: *fbd, proxies: [其他-手动, 其他-自动], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png"}
  - {name: 其他-手动,  <<: *sd, filter: '^(?i)((?!(直连|拒绝|广港|香港|HK|Hong(?:\s?Kong)?|HKG|广台|台湾|台灣|TW|Tai(?:\s?Wan)?|广新|新加坡|SG|坡|狮城|Singa(?:\s?pore)?|SGP|广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|United(?:\s?States)?|加拿大|CA|Canada|墨西哥|MX|Mexico|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|Japan|NRT|HND)).)*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png"}
  - {name: 其他-自动,  <<: *utd, filter: '^(?i)(?!.*\[69\])((?!(直连|拒绝|广港|香港|HK|Hong(?:\s?Kong)?|HKG|广台|台湾|台灣|TW|Tai(?:\s?Wan)?|广新|新加坡|SG|坡|狮城|Singa(?:\s?pore)?|SGP|广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|United(?:\s?States)?|加拿大|CA|Canada|墨西哥|MX|Mexico|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|Japan|NRT|HND)).)*$', icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png"}

# ========================
# 规则集提供者 (Rule Providers) - 定义从外部下载规则集的方式和元数据
# ========================
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain_mrs: &mrs {type: http, interval: 86400, behavior: domain, format: mrs}
  domain_yaml: &yaml {type: http, interval: 86400, behavior: domain, format: yaml}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
  # Classical 格式文件
  # https://github.com/blackmatrix7/ios_rule_script/tree/master/rule/Clash
  # Mrs 格式文件
  # https://github.com/MetaCubeX/meta-rules-dat/tree/meta/geo

rule-providers:
  # 自定义或非直接 GEOSITE/GEOIP 类型数据
  Custom-Direct: {<<: *class, url: "https://fastly.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct.list"}
  Steam-CDN: {<<: *class, url: "https://fastly.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN.list"}
  test: {<<: *class, url: "https://fastly.jsdelivr.net/gh/liandu2024/clash@main/list/Check.list"}
  anti-AD: {<<: *mrs, url: "https://fastly.jsdelivr.net/gh/privacy-protection-tools/anti-ad.github.io@master/docs/mihomo.mrs"}

# ========================
# 流量规则 (Rules) - 定义流量分发逻辑
# 规则从上到下匹配，一旦匹配成功，后续规则不再生效
# ========================
rules:
  # 本地及私有网络直连规则
  - GEOSITE,private,CN # 私有地址IP规则
  - RULE-SET,Custom-Direct,CN # 自定义直连(Custom_OpenClash项目维护的域名)
  - GEOSITE,category-game-platforms-download,CN # 游戏平台下载（如 Epic 启动器、战网等）
  - RULE-SET,Steam-CDN,CN # Steam内容分发(Custom_OpenClash项目维护的域名)
  - GEOSITE,category-public-tracker,CN # 公共 BT Tracker（直连避免代理干扰）
  - GEOSITE,category-games@cn,CN # 中国区游戏平台

  # 特定业务代理分流规则
  - RULE-SET,anti-AD,REJECT # 广告规则
  - GEOSITE,category-ai-!cn,AI # 非中国区 AI 服务（如 ChatGPT、Gemini 等）
  - GEOSITE,github,AI
  - GEOSITE,category-communication,Chat # 即时通讯服务域名（Telegram、WhatsApp 等）
  - GEOSITE,category-social-media-!cn,Social # 非中国区社交媒体（如 X、Instagram、Facebook 等）
  - GEOSITE,steam,Game
  - GEOSITE,category-games,Game # 其他游戏平台（如 Epic、Origin、Uplay 等）
  - GEOSITE,youtube,YouTube
  - GEOSITE,category-entertainment,Streaming # 非中国区流媒体（如 Netflix、Disney+ 等）
  - GEOSITE,google,Google
  - GEOSITE,apple,Corp
  - GEOSITE,microsoft,Corp
  - GEOSITE,nvidia,Corp
  - RULE-SET,test,Test
  - GEOSITE,gfw,Proxy
  - GEOSITE,cn,CN

  # GEOIP 类规则
  - GEOIP,private,CN,no-resolve
  - GEOIP,telegram,Chat,no-resolve
  - GEOIP,twitter,Social,no-resolve
  - GEOIP,facebook,Social,no-resolve
  - GEOIP,netflix,Streaming,no-resolve
  - GEOIP,google,Google,no-resolve
  - GEOIP,cn,CN,no-resolve

  # 9. 兜底规则 (所有未匹配上述规则的流量都将走此策略)
  - MATCH,Proxy
